<div class="container">

  <div class="card">

    <h1>Currency Converter</h1>

    <div class="form-group">

      <label>Amount</label>

      <input
        type="number"
        [(ngModel)]="amount"
        class="form-control">

    </div>

    <div class="form-group">

      <label>From</label>

      <select
        [(ngModel)]="fromCurrency"
        class="form-control">

        <option
          *ngFor="let currency of currencies"
          [ngValue]="currency">

          {{currency.name}} - {{currency.full_name}}

        </option>

      </select>

    </div>

    <button
      class="btn btn-primary mt-3"
      (click)="switchCurrencies()">

      Switch

    </button>

    <div class="form-group mt-3">

      <label>To</label>

      <select
        [(ngModel)]="toCurrency"
        class="form-control">

        <option
          *ngFor="let currency of currencies"
          [ngValue]="currency">

          {{currency.name}} - {{currency.full_name}}

        </option>

      </select>

    </div>

    <button
      class="btn btn-success mt-3"
      (click)="convertCurrency()">

      Convert

    </button>

    <h2 class="mt-4">

      {{result | number:'1.2-2'}}

      {{toCurrency?.name}}

    </h2>

  </div>

</div>
